services:
  db:
    image: pgvector/pgvector:pg16
    container_name: prd-kb-db
    environment:
      POSTGRES_DB: prd_knowledge_base
      POSTGRES_USER: prd_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prd_user -d prd_knowledge_base"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: prd-kb-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=["http://localhost:3000", "http://${SERVER_IP:-localhost}:3000"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: prd-kb-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
